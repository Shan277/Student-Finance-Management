<!DOCTYPE html>
<html>
<head>
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Trip to Goa</h1>

        <div class="cards">
            <div class="card">
                <h3>Total Spent</h3>
                <p>₹ 12,500</p>
            </div>

            <div class="card">
                <h3>Total Members</h3>
                <p>4</p>
            </div>

            <div class="card">
                <h3>Total Expenses</h3>
                <p>8</p>
            </div>
        </div>

        <div class="section">
            <h2>Member Balances</h2>
            <table>
                <tr>
                    <th>Name</th>
                    <th>Balance</th>
                </tr>
                <tr>
                    <td>Aman</td>
                    <td class="positive">+ ₹2000</td>
                </tr>
                <tr>
                    <td>Rahul</td>
                    <td class="negative">- ₹1000</td>
                </tr>
                <tr>
                    <td>Vikas</td>
                    <td class="negative">- ₹1000</td>
                </tr>
            </table>
        </div>

        <div class="section">
            <h2>Settlement Summary</h2>
            <p>Rahul → Pay ₹1000 to Aman</p>
            <p>Vikas → Pay ₹1000 to Aman</p>
        </div>

        <button class="btn">+ Add Expense</button>

    </div>

</body>
</html>
