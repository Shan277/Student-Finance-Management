<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <style>
        body{
             margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff0000, #ffe100);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
            
        }
        .login-container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
      transition: transform 0.3s ease;
    }
    .login-container:hover {
      transform: translateY(-5px);
    }

    .login-container h2 {
      margin-bottom: 20px;
      color: #000000;
    }
    .input-field {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #000000;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .input-field:focus {
      border-color: #667eea;
    }
    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: linear-gradient(135deg, #6690e4, #082d85);
      border: none;
      border-radius: 8px;
      color: #000000;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: linear-gradient(135deg, #373636, #323030);
    }
    .links {
      margin-top: 15px;
      font-size: 14px;
    }
    .links a {
      color: #667eea;
      text-decoration: none;
      transition: color 0.3s ease;
    }
     .links a:hover {
      color: #764ba2;
    }

    </style>
</head>
<body>
    <div class="login-container">
        <h1>Welcome</h1>
        <form>
           <input type="text" class="input-field" placeholder="Username" required>
      <input type="password" class="input-field" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
        </form>
        <div class="links">
            <a href="#">Forgot password?</a> | <a href="#">sign up</a>

        </div>
    </div>
