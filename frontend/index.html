<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <!-- Linking external CSS -->
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="login-container">
    <div class="form-box active" id = "login-form">
        <form>
            <h1>Login</h1>
            <input type="text" class="input-field" id="username" placeholder="Username" required>
            <input type="password" class="input-field" id="password" placeholder="Password" required>
            <button class="btn">Login</button>
        </form>
    <div class="links">
      <p>Don't have an account? <a href="#" onclick="showForm('register-form')">Register</a> </p>
    </div>
  </div>  

    <div class="form-box" id = "register-form">
        <form>
            <h1>Register</h1>
            <input type="text" class="input-field" placeholder="username" id="reg-username" required>
            <input type="password" class="input-field" placeholder="Password" id="reg-password" required>
            <input type="email" class="input-field" placeholder="Email">
            <select class="input-field">
                <option value="" disabled selected>Select Role</option>
                <option value="student">Student</option>
                <option value="admin">Admin</option>
            </select>
            <button type="button" class="btn" onclick="register()">Register</button>
        </form>
        <div class="links">
          <p>Already have an account? <a href="#" onclick="showForm('login-form')">Login</a> </p>
        </div>
    </div>

  <script src="javascript/index.js"></script>
</body>
</html>
